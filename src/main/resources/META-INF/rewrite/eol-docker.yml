type: specs.openrewrite.org/v1beta/recipe
name: io.moderne.devcenter.eol.DevCenterDockerEndOfLife
displayName: 'DevCenter: Docker base image end of life'
description: >-
  A DevCenter configuration that tracks the end-of-life status of Docker base images used in
  Dockerfile FROM instructions, sourced from a Moderne EOL feed. Images are matched on the leading
  version of their tag; codename tags (e.g. `debian:bullseye`) cannot be version-matched. Supply
  your own feed with the `feed` option to track internal images — see `FEED-FORMAT.md`.
recipeList:
  - io.moderne.devcenter.eol.DockerImageEndOfLife:
      cardName: Docker base image end of life
      approachingDays: 180
  - io.moderne.devcenter.FindOrganizationStatistics
  - org.openrewrite.search.FindCommitters
