type: specs.openrewrite.org/v1beta/recipe
name: io.moderne.devcenter.eol.DevCenterRuntimeEndOfLife
displayName: 'DevCenter: runtime end of life'
description: >-
  A DevCenter configuration that tracks the end-of-life status of language runtimes (the Java
  version, the Node.js version from package.json engines, and the .NET target framework), sourced
  from a Moderne EOL feed. Supply your own feed with the `feed` option to track internal runtimes —
  see `FEED-FORMAT.md`.
recipeList:
  # One card per runtime, so the runtime is visible in the card title. The `runtime` option narrows
  # each card to its own ecosystem's files (no cross-ecosystem scanning).
  - io.moderne.devcenter.eol.RuntimeEndOfLife:
      cardName: .NET runtime end of life
      approachingDays: 180
      runtime: DotNet
  - io.moderne.devcenter.eol.RuntimeEndOfLife:
      cardName: Java runtime end of life
      approachingDays: 180
      runtime: Java
  - io.moderne.devcenter.eol.RuntimeEndOfLife:
      cardName: Node.js runtime end of life
      approachingDays: 180
      runtime: NodeJs
  - io.moderne.devcenter.eol.RuntimeEndOfLife:
      cardName: Python runtime end of life
      approachingDays: 180
      runtime: Python
  - io.moderne.devcenter.FindOrganizationStatistics
  - org.openrewrite.search.FindCommitters
